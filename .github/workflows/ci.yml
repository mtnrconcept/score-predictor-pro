name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: deno fmt --check supabase/functions
      - run: >-
          deno check
          supabase/functions/ai-settings/index.ts
          supabase/functions/sports-research/index.ts
          supabase/functions/import-football/index.ts
          supabase/functions/settle-predictions/index.ts
      - run: npm run build
