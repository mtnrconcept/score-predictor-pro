name: Deploy Supabase AI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-supabase-ai.yml"
      - "supabase/functions/ai-settings/**"
      - "supabase/functions/sports-research/**"

permissions:
  contents: read

concurrency:
  group: deploy-supabase-ai-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_PROJECT_REF: snzepjldrtojbvrfyjtw
      OPENAI_RESEARCH_MODEL: gpt-5.6-sol
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing GitHub secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing GitHub secret: OPENAI_API_KEY"
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify OpenAI key and model access
        shell: bash
        run: |
          status="$(curl --silent --show-error --output /tmp/openai-model.json --write-out "%{http_code}" \
            --header "Authorization: Bearer $OPENAI_API_KEY" \
            "https://api.openai.com/v1/models/$OPENAI_RESEARCH_MODEL")"
          if [ "$status" != "200" ]; then
            code="$(jq -r '.error.code // "unknown"' /tmp/openai-model.json)"
            echo "OpenAI model verification failed: HTTP $status ($code)"
            exit 1
          fi

      - name: Synchronize Supabase AI secrets
        shell: bash
        run: |
          supabase secrets set \
            OPENAI_API_KEY="$OPENAI_API_KEY" \
            OPENAI_RESEARCH_MODEL="$OPENAI_RESEARCH_MODEL" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy AI Edge Functions
        shell: bash
        run: |
          supabase functions deploy ai-settings --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy sports-research --project-ref "$SUPABASE_PROJECT_REF"

      - name: Verify Supabase AI runtime
        shell: bash
        run: |
          health="$(curl --fail --silent --show-error \
            "https://$SUPABASE_PROJECT_REF.supabase.co/functions/v1/sports-research")"
          configured="$(jq -r '.openAiConfigured' <<< "$health")"
          model="$(jq -r '.model' <<< "$health")"
          if [ "$configured" != "true" ] || [ "$model" != "$OPENAI_RESEARCH_MODEL" ]; then
            echo "Supabase AI runtime verification failed"
            exit 1
          fi
          echo "Supabase AI runtime is configured for $model"
